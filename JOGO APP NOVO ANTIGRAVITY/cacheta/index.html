<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Royal Money Cacheta</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="top-bar">
        <a href="../battle.html" class="back-btn">&larr; VOLTAR</a>
        <h1>ROYAL <span>CACHETA</span></h1>
    </div>

    <div class="game-info">
        <div class="player p2">INIMIGO (Bot) <span id="score2">Cartas: 9</span></div>
        <div class="turn-indicator" id="turn-indicator">COMPRE UMA CARTA</div>
        <div class="player p1 active">SUA MÃO <span id="score1">Cartas: 9</span></div>
    </div>

    <div class="table-area">
        <div class="deck-container" id="deck-btn">
            <div class="card card-back">COMPRAR</div>
        </div>
        <div class="discard-container">
            <div id="discard-pile" class="card empty">LIXO</div>
        </div>
    </div>

    <div class="player-hand-container">
        <div id="player-hand" class="player-hand"></div>
    </div>

    <div class="controls">
        <button id="discard-mode-btn" class="action-btn">Descartar (Selecione carta e clique)</button>
        <button id="batida-btn" class="action-btn pass-btn">BATER / CACHETA</button>
    </div>

    <div id="status-msg" class="status-msg">Você precisa de 3 Trincas para Bater!</div>

    <script src="main.js"></script>
</body>

</html>
