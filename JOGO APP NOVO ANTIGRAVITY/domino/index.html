<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Royal Money Dominó</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="top-bar">
        <a href="../battle.html" class="back-btn">&larr; VOLTAR</a>
        <h1>ROYAL <span>DOMINÓ</span></h1>
    </div>

    <div class="game-info">
        <div class="player p2">LARANJA SANGUE (P 2) <span id="score2">Pedras: 7</span></div>
        <div class="turn-indicator" id="turn-indicator">VEZ DO LARANJA NEON</div>
        <div class="player p1 active">LARANJA NEON (Você) <span id="score1">Pedras: 7</span></div>
    </div>

    <div class="board-container" id="board-container">
        <div id="board" class="board">
            <div id="board-content" class="board-content"></div>
        </div>
    </div>

    <div class="player-hand-container">
        <div id="player-hand" class="player-hand"></div>
    </div>

    <div class="controls">
        <button id="draw-btn" class="action-btn draw-btn">Comprar Pedra</button>
        <button id="pass-btn" class="action-btn pass-btn" style="display:none;">Passar a Vez</button>
    </div>

    <script src="main.js"></script>
</body>

</html>
