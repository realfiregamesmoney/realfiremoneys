<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lobby - Seleção de Jogo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      background-color: #0b0d17;
      font-family: 'Orbitron', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 15vh;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
      position: relative;
      box-sizing: border-box;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(0deg, rgba(255, 85, 0, 0.1) 0%, transparent 100%),
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 170, 0, 0.05) 3px, rgba(255, 170, 0, 0.05) 3px);
      pointer-events: none;
      z-index: -1;
    }

    h1 {
      font-size: 32px;
      color: #fff;
      text-shadow: 0 0 10px #ff5500, 0 0 20px #ff5500, 0 0 40px #ff5500;
      margin-top: 0;
      margin-bottom: 40px;
      padding: 0 10px;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 2px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 30px;
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
      box-sizing: border-box;
      z-index: 1;
    }

    .game-card {
      background: linear-gradient(135deg, rgba(50, 0, 50, 0.8) 0%, rgba(10, 0, 20, 0.8) 100%);
      border: 2px solid #ff5500;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 15px rgba(255, 85, 0, 0.2), inset 0 0 20px rgba(255, 85, 0, 0.1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .game-card::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      bottom: -50%;
      left: -50%;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0));
      transform: rotateZ(60deg) translate(-50%, 0);
      transition: all 0.5s ease-out;
      opacity: 0;
    }

    .game-card:hover::after {
      opacity: 1;
      transform: rotateZ(60deg) translate(50%, 0);
    }

    .game-card:hover {
      background: linear-gradient(135deg, rgba(80, 0, 80, 0.9) 0%, rgba(20, 0, 40, 0.9) 100%);
      box-shadow: 0 8px 30px rgba(255, 85, 0, 0.6), inset 0 0 30px rgba(255, 85, 0, 0.2);
      transform: translateY(-5px) scale(1.02);
      border-color: #ff55ff;
    }

    .game-card.original {
      background: linear-gradient(135deg, rgba(0, 50, 50, 0.8) 0%, rgba(0, 10, 20, 0.8) 100%);
      border-color: #ffaa00;
      box-shadow: 0 4px 15px rgba(255, 170, 0, 0.2), inset 0 0 20px rgba(255, 170, 0, 0.1);
    }

    .game-card.original:hover {
      background: linear-gradient(135deg, rgba(0, 80, 80, 0.9) 0%, rgba(0, 20, 40, 0.9) 100%);
      box-shadow: 0 8px 30px rgba(255, 170, 0, 0.6), inset 0 0 30px rgba(255, 170, 0, 0.2);
      border-color: #55ffff;
    }

    .game-card h2 {
      margin: 0 0 12px 0;
      font-size: 26px;
      letter-spacing: 1.5px;
    }

    .game-card.original h2 {
      color: #ffaa00;
      text-shadow: 0 0 5px #ffaa00;
    }

    .game-card:not(.original) h2 {
      color: #ff5500;
      text-shadow: 0 0 5px #ff5500;
    }

    .game-card p {
      margin: 0;
      font-size: 15px;
      color: #cccccc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.4;
    }

    .footer-text {
      position: absolute;
      bottom: 15vh;
      left: 15px;
      right: 15px;
      text-align: center;
      font-size: 16px;
      color: #aaaaaa;
      font-family: sans-serif;
      line-height: 1.5;
      max-width: 600px;
      margin: 0 auto;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>

<body>
  <h1>ROYAL MONEY RACE</h1>

  <div class="menu">
    <a href="./antigravity/index.html" class="game-card original">
      <h2>SHOOTING (CLÁSSICO)</h2>
      <p>Modo Espacial Antigravidade.</p>
    </a>

    <a href="./royal_race/index.html" class="game-card">
      <h2>JUMPING</h2>
      <p>Ganhe Pontos no Ranking PULANDO.</p>
    </a>
  </div>

  <div class="footer-text">
    Escolha um Jogo, ganhe pontos, fique em 1 Lugar no Ranking e leve o Prêmio Semanal em Dinheiro.
  </div>
</body>

</html>
