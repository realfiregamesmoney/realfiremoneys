<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shooting Game - Real Fire</title>
  <link rel="stylesheet" href="./style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
    <script src="/minigames/anticheat.js"></script>
</head>

<body>
  <div id="ui">
    <div id="level" style="display: none;">MUNDO 1</div>
    <div id="score" style="display: none;">🏆 0</div>
    <div id="health" style="display: none;">HP: 100%</div>

    <div id="start-screen">
      <h1 style="color: #f97316; font-style: italic; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(234, 88, 12, 0.5); font-size: 14px; margin-bottom: 30px;">
        Desvie, Atire e Sobreviva
      </h1>
      <button id="start-btn">JOGAR</button>
    </div>

    <div id="gameover" style="display: none;">
      <h1>ELIMINADO</h1>
      <p>Sua pontuação final: <span id="final-score">0</span></p>
      <button id="restart-btn" style="margin-top: 20px; background: transparent; color: #f97316; border: 2px solid #f97316; padding: 10px 30px; border-radius: 8px; font-weight: 900; font-style: italic; cursor: pointer; text-transform: uppercase;">Jogar Novamente</button>
      <p style="font-size: 10px; margin-top: 30px;">Toque fora da caixa para voltar ao Aplicativo Principal.</p>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
