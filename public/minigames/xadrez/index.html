<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Royal Money Xadrez</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Modernized Styles targeting real app design */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: #050505;
            background-image:
                radial-gradient(circle at 50% -20%, rgba(234, 88, 12, 0.15), transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        .top-bar {
            width: 100%;
            background: rgba(10, 10, 10, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 15px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 100;
        }

        .back-btn {
            position: absolute;
            left: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a1a1aa;
            font-weight: 900;
            font-size: 14px;
            border-radius: 8px;
            padding: 6px 14px;
            line-height: 1;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(234, 88, 12, 0.15);
            border-color: rgba(234, 88, 12, 0.5);
            color: #f97316;
            box-shadow: 0 0 10px rgba(234, 88, 12, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            text-shadow: none;
            letter-spacing: 1px;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            font-style: italic;
            font-weight: 900;
        }

        h1 span {
            color: #f97316;
        }

        .game-info {
            background: rgba(15, 15, 18, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            padding: 15px 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0.6;
            transition: all 0.4s ease;
        }

        .player.active {
            opacity: 1;
            transform: scale(1.05);
        }

        .player-identity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #3f3f46;
            object-fit: cover;
            background: #18181b;
            transition: all 0.3s ease;
        }

        .player.active .player-avatar {
            border-color: #f97316;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        .player-name-val {
            font-size: 11px;
            font-weight: 800;
            color: #a1a1aa;
            text-transform: uppercase;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player.active .player-name-val {
            color: #fff;
        }

        .player span {
            font-size: 14px;
            font-weight: 900;
            color: #fff;
            margin-top: 5px;
        }

        .player.active span {
            color: #f97316;
        }

        .turn-indicator {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: #f97316;
            padding: 8px 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            backdrop-filter: blur(10px);
        }

        #turn-indicator {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 900;
        }

        .timer-val {
            font-size: 14px;
            font-weight: 900;
            color: #f97316;
            margin-top: 4px;
        }

        .game-timer {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* 3D BOARD SYSTEM */
        .board-container {
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px;
            padding-bottom: 20px;
            position: relative;
        }

        .board-wrapper {
            background: #27272a;
            padding: 0;
            border-radius: 8px;
            border: 8px solid #18181b;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.8),
                0 10px 20px rgba(0, 0, 0, 0.5),
                inset 0 0 40px rgba(0, 0, 0, 1);
            transform: rotateX(25deg);
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: min(90vw, 400px);
            height: min(90vw, 400px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #18181b;
            transform-style: preserve-3d;
        }

        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transform-style: preserve-3d;
        }

        .cell.light {
            background: #e2e2e7 !important;
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(0, 0, 0, 0.05)) !important;
        }

        .cell.dark {
            background: #18181b !important;
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.2)) !important;
        }

        /* Modern 3D Piece Design (Unicode Extrusion) */
        .piece {
            font-size: min(8vw, 38px);
            cursor: pointer;
            position: relative;
            transform: translateZ(10px);
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 5px 5px rgba(0, 0, 0, 0.5));
        }

        .piece.p1 {
            color: #f97316 !important;
            text-shadow:
                0 1px 0 #ea580c,
                0 2px 0 #c2410c,
                0 3px 0 #9a3412,
                0 4px 0 #7c2d12,
                0 10px 15px rgba(0, 0, 0, 0.6);
        }

        .piece.p2 {
            color: #f4f4f5 !important;
            text-shadow:
                0 1px 0 #d4d4d8,
                0 2px 0 #a1a1aa,
                0 3px 0 #71717a,
                0 4px 0 #52525b,
                0 10px 15px rgba(0, 0, 0, 0.6);
        }

        .piece.selected {
            transform: translateZ(35px) scale(1.1);
            color: #fff !important;
            text-shadow: 0 0 20px #f97316, 0 0 40px #f97316 !important;
            z-index: 100;
        }

        .cell.valid-move::before {
            content: '';
            position: absolute;
            width: 25%;
            height: 25%;
            background: rgba(34, 197, 94, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 15px #22c55e;
            z-index: 5;
            animation: pulse-glow 1.5s infinite alternate;
        }

        @keyframes pulse-glow {
            from {
                transform: scale(0.8) translateZ(2px);
                opacity: 0.5;
            }

            to {
                transform: scale(1.2) translateZ(5px);
                opacity: 1;
            }
        }

        @media screen and (max-width: 500px) {
            .board-wrapper {
                transform: rotateX(20deg);
            }

            .game-info {
                padding: 10px 15px;
            }

            .player-name-val {
                display: none;
            }
        }

        .piece.p1 {
            color: #f97316 !important;
            /* Neon Orange */
            filter: drop-shadow(0 0 5px rgba(249, 115, 22, 0.4));
        }

        .piece.p2 {
            color: #fafafa !important;
            /* Pure White for contrast */
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .piece.selected {
            transform: scale(1.2) translateY(-5px);
            text-shadow: 0 0 20px rgba(249, 115, 22, 0.8) !important;
            z-index: 10;
        }

        .cell.valid-move::after {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background: #22c55e !important;
            border-radius: 50%;
            box-shadow: 0 0 15px #22c55e;
            z-index: 5;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        @media screen and (max-width: 640px) {
            .game-info {
                max-width: 350px;
                padding: 10px;
                margin-bottom: 20px;
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }

            .top-bar h1 {
                font-size: 16px;
            }

            .turn-indicator {
                order: 3;
                width: 100%;
                text-align: center;
            }
        }

        /* End */
    </style>
    <script src="/minigames/anticheat.js"></script>
</head>

<body>
    <div class="top-bar">
        <a href="javascript:window.location.href='./lobby.html'" class="back-btn">X</a>
        <h1>TORNEIO <span>BATTLE</span></h1>
    </div>

    <div class="game-info">
        <div class="player p2">
            <div class="player-identity">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" class="player-avatar" id="avatar2">
                <div class="player-name-val" id="name2">OPONENTE</div>
            </div>
            <span id="score2">Peças: 16</span>
        </div>

        <div class="turn-indicator" id="turn-indicator-box">
            <span id="turn-indicator">CARREGANDO...</span>
            <div class="game-timer" id="game-timer">10:00</div>
        </div>

        <div class="player p1 active">
            <div class="player-identity">
                <div class="player-name-val" id="name1">VOCÊ</div>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=ea580c"
                    class="player-avatar" id="avatar1">
            </div>
            <span id="score1">Peças: 16</span>
        </div>
    </div>

    <div class="board-container">
        <div class="board-wrapper">
            <div id="board" class="board"></div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        // Load Real Avatars
        try {
            const lsUser = JSON.parse(localStorage.getItem('rf_current_user'));
            if (lsUser) {
                if (lsUser.name) document.getElementById('name1').innerText = lsUser.name;
                if (lsUser.img) document.getElementById('avatar1').src = lsUser.img;
            }
        } catch (e) { }
    </script>
</body>

</html>
