<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Royal Money Batalha Naval</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Modernized Styles targeting real app design */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: #050505;
            background-image:
                radial-gradient(circle at 50% -20%, rgba(234, 88, 12, 0.15), transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 24px;
            box-sizing: border-box;
            position: relative;
            background: rgba(10, 10, 10, 0.82);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .top-bar h1 {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            font-size: 18px;
            font-style: italic;
            font-weight: 900;
            color: #fff;
            white-space: nowrap;
        }

        .top-bar h1 span {
            color: #f97316;
        }

        .back-btn {
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.2s;
            position: relative;
            z-index: 1001;
            left: auto;
            /* Reset individual positional styles */
        }

        .back-btn:hover {
            background: rgba(234, 88, 12, 0.15);
            border-color: #f97316;
            box-shadow: 0 0 10px #f97316;
        }

        .game-timer {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            position: relative;
            z-index: 1001;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 98%;
            max-width: 800px;
            background: rgba(20, 20, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 12px 10px;
            margin: 20px auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            flex-shrink: 0;
            box-sizing: border-box;
            gap: 8px;
        }

        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .player.active {
            opacity: 1;
        }

        .player-identity {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #3f3f46;
            object-fit: cover;
        }

        .player.active .player-identity {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.1);
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
        }

        .player.active .player-avatar {
            border-color: #f97316;
        }

        .player-name-val {
            font-weight: 800;
            color: #fff;
            font-size: 11px;
            line-height: 1.2;
            text-align: center;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player span {
            font-size: 13px;
            font-weight: 700;
            color: #f97316;
        }

        .turn-indicator {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.4);
            padding: 8px 12px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.1);
            min-width: 90px;
        }

        #turn-indicator {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            color: #fff;
        }

        .timer-val {
            font-size: 18px;
            font-weight: 900;
            color: #f97316;
        }

        .boards-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 95vw;
            margin: 0 auto;
        }

        .board-wrapper {
            background: rgba(10, 10, 10, 0.8);
            border: 4px solid rgba(234, 88, 12, 0.6);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 1), 0 0 30px rgba(234, 88, 12, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 320px;
        }

        .board-title {
            font-size: 11px;
            font-weight: 900;
            color: #f97316;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 1px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            aspect-ratio: 1/1;
        }

        .cell {
            background: #09090b;
            cursor: pointer;
            transition: 0.2s;
        }

        .cell:hover {
            background: rgba(234, 88, 12, 0.2);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            font-weight: 800;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: rgba(234, 88, 12, 0.15);
            border-color: rgba(234, 88, 12, 0.5);
            color: #f97316;
            box-shadow: 0 0 10px rgba(234, 88, 12, 0.3);
        }

        @media screen and (min-width: 768px) {
            .boards-container {
                flex-wrap: nowrap;
                max-width: 800px;
            }

            .controls {
                flex-direction: row;
            }
        }

        @media screen and (max-width: 640px) {
            .game-info {
                max-width: 350px;
                padding: 10px;
                margin-bottom: 20px;
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }

            .top-bar h1 {
                font-size: 16px;
            }

            .turn-indicator {
                order: 3;
                width: 100%;
                text-align: center;
            }
        }

        /* End */
    </style>
    <script src="/minigames/anticheat.js"></script>
</head>

<body>
    <div class="top-bar">
        <a href="javascript:window.location.href='./lobby.html'" class="back-btn">X</a>
        <h1>TORNEIO <span>BATTLE</span></h1>
        <div class="game-timer" id="game-timer">10:00</div>
    </div>

    <div class="game-info">
        <div class="player p2">
            <div class="player-identity">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" class="player-avatar" id="avatar2">
                <div class="player-name-val" id="name2">OPONENTE</div>
            </div>
            <span id="score2">Vivos: 5</span>
        </div>

        <div class="turn-indicator" id="turn-indicator-box">
            <span id="turn-indicator">CARREGANDO...</span>
            <span class="timer-val" id="turn-timer">10s</span>
        </div>

        <div class="player p1 active">
            <div class="player-identity">
                <div class="player-name-val" id="name1">VOCÊ</div>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=ea580c"
                    class="player-avatar" id="avatar1">
            </div>
            <span id="score1">Vivos: 5</span>
        </div>
    </div>

    <div class="boards-container">
        <div class="board-wrapper">
            <div class="board-title">Oceano Inimigo (Atacar)</div>
            <div id="board-enemy" class="board disabled"></div>
        </div>

        <div class="board-wrapper">
            <div class="board-title">Seu Oceano (Posicionar)</div>
            <div id="board-player" class="board"></div>
        </div>
    </div>

    <div class="controls">
        <button id="rotate-btn" class="action-btn">Girar Navio (Horizontal)</button>
        <button id="start-btn" class="action-btn pass-btn" style="display:none;">Iniciar Guerra</button>
    </div>

    <div id="status-msg" class="status-msg">Posicione seu Porta-Aviões (5 espaços)</div>

    <script src="main.js"></script>
    <script>
        // Load Real Avatars
        try {
            const lsUser = JSON.parse(localStorage.getItem('rf_current_user'));
            if (lsUser) {
                if (lsUser.name) document.getElementById('name1').innerText = lsUser.name;
                if (lsUser.img) document.getElementById('avatar1').src = lsUser.img;
            }
        } catch (e) { }
    </script>
</body>

</html>
