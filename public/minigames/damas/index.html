<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Royal Money Damas</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: #050505;
            background-image:
                radial-gradient(circle at 50% -20%, rgba(234, 88, 12, 0.15), transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        .top-bar {
            width: 100%;
            background: rgba(10, 10, 10, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 15px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 100;
            box-sizing: border-box;
        }

        .back-btn {
            position: absolute;
            left: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a1a1aa;
            font-weight: 900;
            font-size: 14px;
            border-radius: 8px;
            padding: 6px 14px;
            line-height: 1;
            text-decoration: none;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            font-style: italic;
            font-weight: 900;
        }

        h1 span {
            color: #f97316;
        }

        .game-info {
            background: rgba(15, 15, 18, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            width: 94%;
            max-width: 500px;
            padding: 15px 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0.6;
            transition: all 0.4s ease;
        }

        .player.active {
            opacity: 1;
            transform: scale(1.05);
        }

        .player-identity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #3f3f46;
            object-fit: cover;
            background: #18181b;
        }

        .player.active .player-avatar {
            border-color: #f97316;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        .player-name-val {
            font-size: 11px;
            font-weight: 800;
            color: #a1a1aa;
            text-transform: uppercase;
        }

        .player.active .player-name-val {
            color: #fff;
        }

        .player-stats {
            font-size: 13px;
            font-weight: 900;
            color: #fff;
            margin-top: 2px;
        }

        .player.active .player-stats {
            color: #f97316;
        }

        .turn-indicator {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: #f97316;
            padding: 8px 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            backdrop-filter: blur(10px);
        }

        #turn-status {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 900;
        }

        .game-timer {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
        }

        .timer-val {
            font-size: 14px;
            font-weight: 900;
            color: #f97316;
            margin-top: 4px;
        }

        /* 3D BOARD RESTORATION */
        .board-container {
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px;
            padding-bottom: 20px;
            position: relative;
        }

        .board-wrapper {
            background: #27272a;
            padding: 0;
            border-radius: 8px;
            border: 8px solid #18181b;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 1);
            transform: rotateX(25deg);
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: min(90vw, 400px);
            height: min(90vw, 400px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #18181b;
            transform-style: preserve-3d;
        }

        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transform-style: preserve-3d;
        }

        .cell.light {
            background: #f4f4f5 !important;
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), transparent) !important;
        }

        .cell.dark {
            background: #09090b !important;
            background-image: radial-gradient(circle at 70% 70%, rgba(255, 255, 255, 0.05), transparent) !important;
        }

        /* PIECE 3D RESTORATION */
        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transform: translateZ(5px);
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .piece.p1 {
            background: radial-gradient(circle at 35% 35%, #f97316, #9a3412) !important;
            border: 2px solid #fb923c;
            box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.6), 0 5px 10px rgba(0, 0, 0, 0.8);
        }

        .piece.p2 {
            background: radial-gradient(circle at 35% 35%, #52525b, #18181b) !important;
            border: 2px solid #71717a;
            box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.8), 0 5px 10px rgba(0, 0, 0, 0.9);
        }

        .piece.selected {
            transform: translateZ(25px) scale(1.1);
            z-index: 100;
        }

        .piece.king::after {
            content: '👑';
            font-size: 20px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .cell.valid-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: rgba(34, 197, 94, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 15px #22c55e;
            z-index: 5;
            animation: pulse-glow 1.5s infinite alternate;
        }

        @keyframes pulse-glow {
            from {
                transform: scale(0.8) translateZ(2px);
                opacity: 0.5;
            }

            to {
                transform: scale(1.2) translateZ(5px);
                opacity: 1;
            }
        }

        /* ARENA MOBILE: HORIZONTAL E CENTRALIZADO */
        @media screen and (max-width: 640px) {
            .game-info {
                flex-direction: row-reverse !important;
                /* [VOCÊ] [TIMER] [RIVAL] */
                justify-content: center !important;
                align-items: flex-start !important;
                gap: 8px !important;
                padding: 10px 5px !important;
                width: 98% !important;
                margin: 0 auto 20px auto !important;
                flex-wrap: nowrap !important;
            }

            .player {
                flex-direction: column !important;
                /* Relógio abaixo da foto */
                align-items: center !important;
                flex: 1 1 0% !important;
                min-width: 0 !important;
            }

            .player-identity {
                flex-direction: column !important;
                align-items: center !important;
                gap: 4px !important;
            }

            .player-avatar {
                width: 36px !important;
                /* Otimizado para w-9 */
                height: 36px !important;
            }

            .player-name-val {
                font-size: 9px !important;
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                max-width: 70px !important;
            }

            .player-stats {
                font-size: 11px !important;
                margin-top: 4px !important;
            }

            .turn-indicator {
                min-width: 85px !important;
                padding: 6px 4px !important;
            }

            .game-timer {
                font-size: 15px !important;
            }

            #turn-status {
                font-size: 8px !important;
            }
        }
    </style>
    <script src="/minigames/anticheat.js"></script>
</head>

<body>
    <div class="top-bar">
        <a href="javascript:void(0)" onclick="window.parent.postMessage({ type: 'MANUAL_EXIT' }, '*')" class="back-btn">X</a>
        <h1>TORNEIO <span>BATTLE</span></h1>
    </div>

    <div class="game-info">
        <div class="player p2" id="p2-box">
            <div class="player-identity">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" class="player-avatar" id="avatar2">
                <div class="player-name-val" id="name2">OPONENTE</div>
            </div>
            <div class="player-stats" id="score2">Peças: 12</div>
        </div>

        <div class="turn-indicator">
            <span id="turn-status">CARREGANDO...</span>
            <div class="game-timer" id="game-timer">10:00</div>
        </div>

        <div class="player p1 active" id="p1-box">
            <div class="player-identity">
                <div class="player-name-val" id="name1">VOCÊ</div>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=ea580c"
                    class="player-avatar" id="avatar1">
            </div>
            <div class="player-stats" id="score1">Peças: 12</div>
        </div>
    </div>

    <div class="board-container">
        <div class="board-wrapper">
            <div id="board" class="board"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
    <script>
        try {
            const user = JSON.parse(localStorage.getItem('rf_current_user'));
            if (user) {
                if (user.name) document.getElementById('name1').innerText = user.name;
                if (user.img) document.getElementById('avatar1').src = user.img;
            }
        } catch (e) { }
    </script>
</body>

</html>
